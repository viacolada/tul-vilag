<!DOCTYPE html>
<html lang="hu">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Túl-világ</title>
    <link rel="stylesheet" href="style.css">
    <script src="theme.js"></script>
</head>
<body>
    <button class="theme-toggle" aria-label="Téma váltás"></button>
    <h1>Túl-világ</h1>
    <figure class="quote-box">
        <blockquote>
            <p>&bdquo;In each of us, there is another whom we do not know. He speaks to us in dreams, tells us things we do not understand, and guides us in moments when reason fails. This stranger is closer than our own shadow.&rdquo;</p>
        </blockquote>
        <figcaption>&mdash; C. G. Jung</figcaption>
    </figure>
    <div class="chapters">
        <div class="chapter-wrapper">
            <a href="fejezet1.html" id="btn-ch1" class="locked">1. fejezet</a>
            <div id="countdown" class="countdown"></div>
        </div>
        <div class="chapter-wrapper">
            <a id="btn-ch2" class="locked">2. fejezet</a>
            <div id="countdown2" class="countdown"></div>
        </div>
       <!--<a href="fejezet3.html">3. fejezet</a>-->
    </div>
    <script>
        (function() {
            // 1. fejezet visszaszámláló
            var target1 = new Date("2026-04-04T00:00:00").getTime();
            var btn1 = document.getElementById("btn-ch1");
            var cd1 = document.getElementById("countdown");

            function update1() {
                var now = Date.now();
                var diff = target1 - now;
                if (diff <= 0) {
                    cd1.textContent = "";
                    btn1.classList.remove("locked");
                    btn1.href = "fejezet1.html";
                    return;
                }
                var d = Math.floor(diff / 86400000);
                var h = Math.floor((diff % 86400000) / 3600000);
                var m = Math.floor((diff % 3600000) / 60000);
                var s = Math.floor((diff % 60000) / 1000);
                cd1.textContent = d + " nap " + h + " \u00f3ra " + m + " perc " + s + " mp";
                btn1.classList.add("locked");
                btn1.removeAttribute("href");
                requestAnimationFrame(function() { setTimeout(update1, 1000); });
            }
            update1();

            // 2. fejezet visszaszámláló
            var target2 = new Date("2026-04-12T00:00:00").getTime();
            var btn2 = document.getElementById("btn-ch2");
            var cd2 = document.getElementById("countdown2");

            function update2() {
                var now = Date.now();
                var diff = target2 - now;
                if (diff <= 0) {
                    cd2.textContent = "";
                    btn2.classList.remove("locked");
                    btn2.href = "fejezet2.html";
                    return;
                }
                var d = Math.floor(diff / 86400000);
                var h = Math.floor((diff % 86400000) / 3600000);
                var m = Math.floor((diff % 3600000) / 60000);
                var s = Math.floor((diff % 60000) / 1000);
                cd2.textContent = d + " nap " + h + " \u00f3ra " + m + " perc " + s + " mp";
                btn2.classList.add("locked");
                btn2.removeAttribute("href");
                requestAnimationFrame(function() { setTimeout(update2, 1000); });
            }
            update2();
        })();
    </script>
</body>
</html>
