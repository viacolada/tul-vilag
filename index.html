<!DOCTYPE html>
<html lang="hu">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Túl-világ</title>
    <link rel="stylesheet" href="style.css">
    <script src="theme.js"></script>
</head>
<body>
    <button class="theme-toggle" aria-label="Téma váltás"></button>
    <h1>Túl-világ</h1>
    <figure class="quote-box">
        <blockquote>
            <p>&bdquo;In each of us, there is another whom we do not know. He speaks to us in dreams, tells us things we do not understand, and guides us in moments when reason fails. This stranger is closer than our own shadow.&rdquo;</p>
        </blockquote>
        <figcaption>&mdash; C. G. Jung</figcaption>
    </figure>
    <div class="chapters">
        <div class="chapter-wrapper">
            <a href="fejezet1.html" id="btn-ch1" class="locked">1. fejezet</a>
            <div id="countdown" class="countdown"></div>
        </div>
        <!--<a href="fejezet2.html">2. fejezet</a>-->
       <!--<a href="fejezet3.html">3. fejezet</a>-->
    </div>
    <script>
        (function() {
            var target = new Date("2026-03-28T00:00:00").getTime();
            var btn = document.getElementById("btn-ch1");
            var cd = document.getElementById("countdown");

            function update() {
                var now = Date.now();
                var diff = target - now;
                if (diff <= 0) {
                    cd.textContent = "";
                    btn.classList.remove("locked");
                    btn.href = "fejezet1.html";
                    return;
                }
                var d = Math.floor(diff / 86400000);
                var h = Math.floor((diff % 86400000) / 3600000);
                var m = Math.floor((diff % 3600000) / 60000);
                var s = Math.floor((diff % 60000) / 1000);
                cd.textContent = d + " nap " + h + " \u00f3ra " + m + " perc " + s + " mp";
                btn.classList.add("locked");
                btn.removeAttribute("href");
                requestAnimationFrame(function() { setTimeout(update, 1000); });
            }
            update();
        })();
    </script>
</body>
</html>
