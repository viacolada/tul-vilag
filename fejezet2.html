<!DOCTYPE html>
<html lang="hu">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>2. fejezet – Túl-világ</title>
    <link rel="stylesheet" href="style.css">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/mammoth/1.8.0/mammoth.browser.min.js"></script>
    <script src="theme.js"></script>
</head>
<body>
    <button class="theme-toggle" aria-label="Téma váltás"></button>
    <h1 id="chapter-title">2. fejezet</h1>
    <div class="content-wrapper">
        <div id="content">Betöltés...</div>
    </div>
    <script>
        fetch("2-SODRODAS.docx")
            .then(function(r) { return r.arrayBuffer(); })
            .then(function(buf) { return mammoth.convertToHtml({ arrayBuffer: buf }); })
            .then(function(result) {
                var tmp = document.createElement("div");
                tmp.innerHTML = result.value;
                var first = tmp.querySelector("p");
                if (first) {
                    var chapterTitle = document.getElementById("chapter-title");
                    chapterTitle.textContent = first.textContent;
                    document.title = first.textContent + " – Túl-világ";
                    first.remove();
                }
                document.getElementById("content").innerHTML = tmp.innerHTML;
                var ps = document.getElementById("content").querySelectorAll("p");
                for (var i = 0; i < ps.length; i++) {
                    var t = ps[i].textContent.trimStart();
                    if (t.charAt(0) === "\u2013" || t.charAt(0) === "\u2014" || t.charAt(0) === "-") {
                        ps[i].classList.add("dialogue");
                    }
                }
            });
    </script>
    <a class="back" href="index.html">← Vissza a főoldalra</a>
</body>
</html>
